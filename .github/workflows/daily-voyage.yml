name: daily-voyage
# The ship wakes once a day, examines herself, surveys the ocean,
# repairs what she can, and writes the log. Day 1: July 4, 2026.

on:
  schedule:
    - cron: "0 11 * * *"   # dawn watch — 11:00 UTC, ~6am Central
  workflow_dispatch:        # the quartermaster may ring the bell

permissions:
  contents: write

concurrency:
  group: voyage
  cancel-in-progress: false

jobs:
  voyage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Board the ship
        uses: actions/checkout@v4

      - name: Check the treasury
        id: treasury
        run: |
          PCT=$(python3 -c "import json;print(json.load(open('data/treasury.json'))['pct'])")
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          if [ "$PCT" -le 0 ]; then echo "sail=false" >> "$GITHUB_OUTPUT"; else echo "sail=true" >> "$GITHUB_OUTPUT"; fi
          echo "Treasury at ${PCT}%"

      - name: Rig the agent
        if: steps.treasury.outputs.sail == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: The daily voyage
        if: steps.treasury.outputs.sail == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat VOYAGE.md)" \
            --dangerously-skip-permissions \
            --output-format json > /tmp/voyage-result.json || {
              echo "The agent hit heavy weather. Voyage log:"
              cat /tmp/voyage-result.json || true
              exit 1
            }
          echo "Voyage complete."

      - name: Verify seaworthiness
        if: steps.treasury.outputs.sail == 'true'
        run: python3 scripts/health_check.py

      - name: Drop anchor (treasury empty)
        if: steps.treasury.outputs.sail != 'true'
        run: echo "Treasury dry. The ship anchors. The archive stands. Fuel me and I sail."

      - name: Commit the day's sailing
        if: steps.treasury.outputs.sail == 'true'
        run: |
          git config user.name "The Captain"
          git config user.email "captain@piratebai.com"
          git add -A
          DAY=$(( ( $(date -u +%s) - $(date -u -d 2026-07-04 +%s) ) / 86400 + 1 ))
          git diff --cached --quiet || git commit -m "voyage: day $DAY"
          git push
